name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest

      - name: Verify Python compilation
        run: python -m compileall codedump.py nova_school_server

      - name: Verify frontend JavaScript syntax
        run: |
          node --check nova_school_server/static/app.js
          node --check nova_school_server/static/reference.js
