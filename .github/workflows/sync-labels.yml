name: Sync Labels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/labels.json"

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Synchronize repository labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const labels = JSON.parse(fs.readFileSync(".github/labels.json", "utf8"));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const existingByName = new Map(existing.map((label) => [label.name, label]));

            for (const label of labels) {
              if (existingByName.has(label.name)) {
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } else {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              }
            }
