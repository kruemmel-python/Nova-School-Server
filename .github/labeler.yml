documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CHANGELOG.md"
          - "CONTRIBUTING.md"
          - "SECURITY.md"
          - "docs/**"
          - "wiki/**"
          - ".github/**"

