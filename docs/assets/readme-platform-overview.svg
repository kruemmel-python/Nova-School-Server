<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Nova School Server Platform Overview</title>
  <desc id="desc">Stylized overview of the Nova School Server user interface with projects, editor, documentation and curriculum areas.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f1df"/>
      <stop offset="50%" stop-color="#f4f7ef"/>
      <stop offset="100%" stop-color="#e4efe9"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#f3efe4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b3d35" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="24" y="22" width="1232" height="72" rx="26" fill="#173d34"/>
  <circle cx="66" cy="58" r="10" fill="#d4dbc7"/>
  <circle cx="98" cy="58" r="10" fill="#d4dbc7"/>
  <circle cx="130" cy="58" r="10" fill="#d4dbc7"/>
  <text x="168" y="67" font-family="Georgia, serif" font-size="30" fill="#f6f2e7" font-weight="700">Nova School Server</text>
  <text x="1118" y="66" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#d8e5da">Browserbasierter Informatikunterricht</text>

  <rect x="30" y="112" width="260" height="570" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="58" y="160" font-family="Georgia, serif" font-size="34" fill="#23302b" font-weight="700">Projekte</text>
  <rect x="58" y="188" width="204" height="88" rx="22" fill="#1d7d75"/>
  <text x="80" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#ffffff" font-weight="700">Python Labor</text>
  <text x="80" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d6f2ec">user: student</text>
  <rect x="58" y="292" width="204" height="88" rx="22" fill="#f7f4eb" stroke="#d9d2c1"/>
  <text x="80" y="329" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#22312d" font-weight="700">Web Labor</text>
  <text x="80" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#5f6b65">group: class-1a</text>
  <rect x="58" y="396" width="204" height="88" rx="22" fill="#f7f4eb" stroke="#d9d2c1"/>
  <text x="80" y="433" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#22312d" font-weight="700">Distributed Playground</text>
  <text x="80" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#5f6b65">teacher template</text>

  <rect x="318" y="112" width="652" height="570" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="350" y="158" font-family="Georgia, serif" font-size="36" fill="#23302b" font-weight="700">Editor und Live-Ausfuehrung</text>
  <rect x="348" y="188" width="592" height="56" rx="16" fill="#ffffff" stroke="#d7d1c0"/>
  <text x="372" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#4a5550">main.py</text>
  <rect x="348" y="260" width="592" height="250" rx="22" fill="#ffffff" stroke="#cdd8d0"/>
  <text x="372" y="306" font-family="'Cascadia Code', Consolas, monospace" font-size="22" fill="#24312d">def greet(name: str) -&gt; str:</text>
  <text x="400" y="344" font-family="'Cascadia Code', Consolas, monospace" font-size="22" fill="#24312d">return f"Hallo {name}, willkommen im Python-Labor."</text>
  <text x="372" y="400" font-family="'Cascadia Code', Consolas, monospace" font-size="22" fill="#24312d">name = input("Name: ").strip()</text>
  <text x="372" y="438" font-family="'Cascadia Code', Consolas, monospace" font-size="22" fill="#24312d">print(greet(name or "Nova School"))</text>

  <rect x="348" y="530" width="188" height="46" rx="18" fill="#1d7d75"/>
  <text x="385" y="559" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="700">Datei ausfuehren</text>
  <rect x="554" y="530" width="168" height="46" rx="18" fill="#f0ece3" stroke="#cfc6b0"/>
  <text x="601" y="559" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#2b3632" font-weight="700">Live ausfuehren</text>
  <rect x="740" y="530" width="168" height="46" rx="18" fill="#f0ece3" stroke="#cfc6b0"/>
  <text x="781" y="559" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#2b3632" font-weight="700">Vorschau</text>

  <rect x="348" y="596" width="592" height="56" rx="16" fill="#ffffff" stroke="#cdd8d0"/>
  <text x="370" y="631" font-family="'Cascadia Code', Consolas, monospace" font-size="20" fill="#2f3a36">Hallo Ralf, willkommen im Python-Labor.</text>

  <rect x="996" y="112" width="254" height="276" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="1024" y="158" font-family="Georgia, serif" font-size="30" fill="#23302b" font-weight="700">Dokumentation</text>
  <rect x="1024" y="188" width="198" height="58" rx="18" fill="#ffffff" stroke="#d7d1c0"/>
  <text x="1048" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#4a5550">Python Documentation</text>
  <text x="1026" y="282" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Offline-Referenzbibliothek</text>
  <text x="1026" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Volltextsuche</text>
  <text x="1026" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Rollenbezogene Handbuecher</text>

  <rect x="996" y="406" width="254" height="276" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="1024" y="452" font-family="Georgia, serif" font-size="30" fill="#23302b" font-weight="700">Modullehrplan</text>
  <text x="1026" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Mini-Module und Lernziele</text>
  <text x="1026" y="528" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Sofort-Rueckmeldung</text>
  <text x="1026" y="558" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Abschlusspruefung</text>
  <text x="1026" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b56">- Zertifikate mit Verifikation</text>

  <text x="44" y="706" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#5a6861">Plattformueberblick: Projekte, Editor, Dokumentation, Lehrplaene und kontrollierte Ausfuehrung in einer Schuloberflaeche.</text>
</svg>
